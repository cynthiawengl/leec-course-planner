<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课程规划与课表</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --panel2: #f1f3f6;
    --border: #e3e6ec;
    --text: #1f2430;
    --muted: #6b7280;
    --accent: #3b6fe0;
    --accent-bg: rgba(59,111,224,.10);
    --meec: #1c7ed6;
    --meec-bg: rgba(28,126,214,.12);
    --meic: #e8590c;
    --meic-bg: rgba(232,89,12,.12);
    --ok: #2f9e64;
    --warn: #b8860b;
    --danger: #d6336c;
    --locked: #8a94a6;
    --shadow: 0 1px 2px rgba(20,25,40,.04), 0 1px 8px rgba(20,25,40,.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .hidden { display: none !important; }

  nav {
    display: flex; gap: 6px; padding: 14px 28px 0;
  }
  nav a {
    text-decoration: none; font-size: 13px; color: var(--muted);
    padding: 7px 14px; border-radius: 20px; border: 1px solid transparent; cursor: pointer;
  }
  nav a.active { background: var(--accent-bg); color: var(--accent); border-color: rgba(59,111,224,.3); font-weight: 600; }
  nav a:hover:not(.active) { background: var(--panel2); }

  header {
    padding: 10px 28px 14px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; color: var(--muted); font-size: 13px; }
  .rules {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 10px;
    font-size: 12.5px;
    color: var(--muted);
  }
  .rules span {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ---- Credit planner view ---- */
  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    align-items: start;
  }
  .semesters {
    padding: 20px 16px 60px 28px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .semesters { grid-template-columns: 1fr; padding-right: 16px; }
  }
  .sem-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    min-height: 160px;
    box-shadow: var(--shadow);
  }
  .sem-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .sem-head h2 { font-size: 15px; margin: 0; }
  .sem-credit-label { font-size: 13px; font-weight: 600; }
  .bar-track {
    height: 7px;
    border-radius: 5px;
    background: var(--panel2);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .bar-fill { height: 100%; border-radius: 5px; transition: width .25s ease, background .25s ease; }
  .course-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 7px 10px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .course-chip.locked { border-style: dashed; color: var(--muted); }
  .course-chip.span-chip { background: var(--accent-bg); border-color: rgba(59,111,224,.3); }
  .course-chip .tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    margin-right: 6px;
    font-weight: 600;
  }
  .tag.meec { background: var(--meec-bg); color: var(--meec); }
  .tag.meic { background: var(--meic-bg); color: var(--meic); }
  .tag.fixed { background: var(--panel2); border: 1px solid var(--border); color: var(--locked); }
  .course-chip .name { flex: 1; }
  .course-chip .cred { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .course-chip button.remove {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 15px; line-height: 1; padding: 2px 4px;
  }
  .course-chip button.remove:hover { color: var(--danger); }
  .empty-hint { color: var(--muted); font-size: 12.5px; padding: 6px 2px; }

  .fixed-toggle-row {
    background: var(--accent-bg);
    border: 1px solid rgba(59,111,224,.3);
    border-radius: 9px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }
  .fixed-toggle-row.off {
    background: var(--panel2);
    border-style: dashed;
    border-color: var(--border);
  }
  .fixed-toggle {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; cursor: pointer;
  }
  .fixed-toggle input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
  .fixed-toggle .name { flex: 1; }
  .fixed-toggle .cred { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .fixed-toggle-row.off .fixed-toggle { color: var(--muted); }

  .period-block { margin-bottom: 10px; }
  .period-block-label {
    font-size: 10.5px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px;
  }
  .period-columns {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .period-col {
    background: var(--panel2);
    border: 1px dashed var(--border);
    border-radius: 9px;
    padding: 6px;
    min-height: 34px;
  }
  .period-col .period-block-label { padding-left: 2px; }
  .period-col-empty { color: var(--muted); font-size: 11px; padding: 4px 2px; }

  .sidebar {
    position: sticky;
    top: 96px;
    height: calc(100vh - 96px);
    border-left: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .sidebar h3 { margin: 0 0 4px; font-size: 14px; }
  .search-box input[type=text] {
    width: 100%;
    padding: 9px 12px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 13px;
  }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; font-size: 12px; }
  .filters label {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--panel); border: 1px solid var(--border);
    padding: 4px 9px; border-radius: 20px; cursor: pointer; color: var(--muted);
  }
  .filters input { accent-color: var(--accent); }
  select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px; font-size: 12.5px; width: 100%;
  }
  .catalog {
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-right: 4px;
  }
  .cat-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 11px;
    box-shadow: var(--shadow);
  }
  .cat-item .top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .cat-item .top .name { font-size: 13px; font-weight: 500; flex: 1; }
  .cat-item .meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .cat-item .actions { display: flex; gap: 6px; }
  .cat-item .actions button {
    flex: 1;
    background: var(--accent-bg);
    border: 1px solid rgba(59,111,224,.35);
    color: var(--accent);
    padding: 5px 8px;
    border-radius: 7px;
    font-size: 11.5px;
    cursor: pointer;
  }
  .cat-item .actions button:hover { background: rgba(59,111,224,.2); }
  .cat-item .actions button:disabled { opacity: .45; cursor: not-allowed; }
  .totalbar {
    padding: 10px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12.5px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
  .totalbar b { color: var(--text); }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #d3d7de; border-radius: 4px; }
  .reset-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer;
  }
  .reset-btn:hover { color: var(--danger); border-color: var(--danger); }

  .plans-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin: 14px 28px 0 28px;
    box-shadow: var(--shadow);
  }
  .plans-panel .plans-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
  }
  .plans-panel h3 { margin: 0; font-size: 14px; }
  .plans-actions { display: flex; gap: 8px; }
  .btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 7px 12px; font-size: 12.5px; cursor: pointer;
  }
  .btn:hover { opacity: .9; }
  .btn.secondary { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .plans-list { display: flex; flex-direction: column; gap: 6px; }
  .plan-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 9px; padding: 8px 10px; font-size: 12.5px;
  }
  .plan-row .pname { font-weight: 600; flex: 1; }
  .plan-row .pmeta { color: var(--muted); font-size: 11.5px; white-space: nowrap; }
  .plan-row .pactions { display: flex; gap: 6px; }
  .plan-row .pactions button {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 8px; font-size: 11.5px; cursor: pointer;
  }
  .plan-row .pactions button:hover { color: var(--accent); border-color: var(--accent); }
  .plan-row .pactions button.danger:hover { color: var(--danger); border-color: var(--danger); }
  .plan-empty { color: var(--muted); font-size: 12.5px; padding: 4px 2px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(20,25,40,.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
  }
  .modal-box {
    background: var(--panel); border-radius: 16px; max-width: 1000px; width: 100%;
    max-height: 88vh; overflow-y: auto; padding: 20px 24px; box-shadow: 0 10px 40px rgba(0,0,0,.15);
  }
  .modal-box h2 { margin: 0 0 4px; font-size: 17px; }
  .modal-box .modal-sub { color: var(--muted); font-size: 12.5px; margin-bottom: 16px; }
  .modal-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
  .compare-slot { margin-bottom: 14px; }
  .compare-slot-title {
    font-size: 12.5px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .03em; margin-bottom: 6px;
  }
  .compare-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .compare-col-head {
    font-weight: 700; font-size: 13.5px; margin-bottom: 8px;
    padding-bottom: 6px; border-bottom: 2px solid var(--border);
  }
  .diff-list { display: flex; flex-direction: column; gap: 4px; }
  .diff-item { font-size: 12.5px; padding: 5px 8px; border-radius: 7px; background: var(--panel2); border: 1px solid var(--border); }
  .diff-item.only-a { border-left: 3px solid var(--meec); }
  .diff-item.only-b { border-left: 3px solid var(--meic); }
  .diff-item.common { color: var(--muted); }
  .diff-none { color: var(--muted); font-size: 12px; font-style: italic; padding: 4px 0; }
  .compare-credit-summary { display: flex; gap: 16px; font-size: 12.5px; color: var(--muted); margin-top: 4px; }

  /* ---- Schedule view ---- */
  .tabs { display: flex; gap: 8px; padding: 14px 28px 0; flex-wrap: wrap; }
  .tab-btn {
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    padding: 8px 16px; border-radius: 10px; font-size: 13px; cursor: pointer;
  }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab-btn .credit-pill { font-size: 11px; opacity: .8; margin-left: 4px; }

  .sched-layout {
    display: grid; grid-template-columns: 240px 1fr; gap: 16px;
    padding: 16px 28px 60px;
    align-items: start;
  }
  @media (max-width: 900px) { .sched-layout { grid-template-columns: 1fr; } }

  .legend {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; position: sticky; top: 16px; box-shadow: var(--shadow);
  }
  .legend h3 { margin: 0 0 10px; font-size: 13.5px; }
  .legend-item {
    display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px;
    font-size: 12.5px; margin-bottom: 4px;
  }
  .legend-item:hover { background: var(--panel2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .legend-item .lname { flex: 1; }
  .legend-item .lmeta { color: var(--muted); font-size: 11px; white-space: nowrap; }
  .legend-empty { color: var(--muted); font-size: 12.5px; padding: 6px 2px; }
  .legend-hint { color: var(--muted); font-size: 11.5px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }

  .cal-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .cal-days-header { display: grid; grid-template-columns: 56px repeat(5, 1fr); border-bottom: 1px solid var(--border); }
  .cal-days-header div { padding: 10px 6px; font-size: 12.5px; font-weight: 600; text-align: center; color: var(--muted); }
  .cal-body { display: grid; grid-template-columns: 56px repeat(5, 1fr); position: relative; }
  .cal-hours { position: relative; }
  .hour-label { position: absolute; right: 6px; transform: translateY(-50%); font-size: 10.5px; color: var(--muted); }
  .cal-day-col {
    position: relative; border-left: 1px solid var(--border);
    background-image: repeating-linear-gradient(to bottom, var(--border) 0, var(--border) 1px, transparent 1px, transparent var(--hourpx));
    cursor: crosshair; user-select: none;
  }
  .cal-block {
    position: absolute; left: 3px; right: 3px; border-radius: 7px;
    padding: 4px 6px; font-size: 11px; overflow: hidden; cursor: grab;
    border: 1px solid rgba(0,0,0,.08); box-shadow: 0 1px 3px rgba(0,0,0,.08); user-select: none;
  }
  .cal-block.ghost { opacity: .55; cursor: grabbing; pointer-events: none; }
  .cal-block.overlap { outline: 2px solid var(--danger); outline-offset: -2px; }
  .cal-block .b-title { font-weight: 700; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
  .cal-block .b-comp { opacity: .85; }
  .cal-block .b-time { opacity: .75; font-size: 10px; }
  .cal-block .resize-handle { position: absolute; left: 0; right: 0; bottom: 0; height: 7px; cursor: ns-resize; }

  .popup {
    position: absolute; z-index: 50; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,.15); padding: 12px; width: 240px; font-size: 12.5px;
  }
  .popup label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 11.5px; }
  .popup select { width: 100%; margin-bottom: 10px; padding: 6px 8px; border-radius: 7px; border: 1px solid var(--border); font-size: 12.5px; }
  .comp-pills { display: flex; gap: 6px; margin-bottom: 12px; }
  .comp-pills button {
    flex: 1; padding: 6px 4px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--panel2); color: var(--text); font-size: 12px; cursor: pointer;
  }
  .comp-pills button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .popup-actions { display: flex; gap: 6px; }
  .popup-actions button {
    flex: 1; padding: 7px 4px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--panel2); font-size: 12px; cursor: pointer;
  }
  .popup-actions button.confirm { background: var(--accent); color: #fff; border-color: var(--accent); }
  .popup-actions button.delete { color: var(--danger); border-color: var(--danger); }
  .popup-overlay { position: fixed; inset: 0; z-index: 40; }
</style>
</head>
<body>

<nav>
  <a class="nav-link active" data-view="plan">学分规划</a>
  <a class="nav-link" data-view="schedule">每周课表</a>
</nav>

<header>
  <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;">
    <div>
      <h1 id="pageTitle">课程学分规划表</h1>
      <p id="pageSub">MEEC (电气与计算机工程) + MEIC-A (信息与计算机工程) · 两年四学期</p>
    </div>
    <button class="reset-btn hidden" id="resetBtn" onclick="resetAll()">清空当前草稿</button>
  </div>
  <div class="rules" id="rulesBar">
    <span>每学期上限 36 ECTS</span>
    <span>第二年 第一学期：PIC 项目 12 ECTS（必修，已锁定）</span>
    <span>第二年 第二学期：论文 Tese 30 ECTS（必修，已锁定）</span>
    <span>一个学期包含两个 period（P1/P2 或 P3/P4）</span>
  </div>
</header>

<!-- ============ VIEW: credit planner ============ -->
<div id="viewPlan">
  <div class="plans-panel">
    <div class="plans-head">
      <h3>已保存的方案</h3>
      <div class="plans-actions">
        <button class="btn secondary" id="compareBtn" disabled onclick="openCompare()">对比所选的两个方案</button>
        <button class="btn" onclick="saveCurrentAsPlan()">将当前草稿保存为新方案</button>
      </div>
    </div>
    <div class="plans-list" id="plansList"></div>
  </div>

  <div class="layout">
    <div class="semesters" id="semesters"></div>

    <div class="sidebar">
      <h3>课程目录（点击加入学期）</h3>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索课程名称 / 缩写...">
      </div>
      <div class="filters" id="programFilters"></div>
      <select id="trackFilter"></select>
      <div class="totalbar">
        <span>目录中课程数</span>
        <span id="catalogCount">-</span>
      </div>
      <div class="catalog" id="catalog"></div>
    </div>
  </div>
</div>

<!-- ============ VIEW: weekly schedule ============ -->
<div id="viewSchedule" class="hidden">
  <div class="tabs" id="slotTabs"></div>

  <div class="sched-layout">
    <div class="legend">
      <h3 id="legendTitle">本学期课程</h3>
      <div id="legendList"></div>
      <div class="legend-hint">在右侧空白处按住鼠标拖动可新建时间块；点击已有时间块可编辑或删除；拖动块体可移动，拖动底边可调整时长。</div>
    </div>

    <div class="cal-wrap">
      <div class="cal-days-header">
        <div></div>
        <div>周一</div><div>周二</div><div>周三</div><div>周四</div><div>周五</div>
      </div>
      <div class="cal-body" id="calBody"></div>
    </div>
  </div>
</div>

<div id="modalRoot"></div>

const SLOTS = [
  {key: 'y1s1', year: 1, sem: 1, label: '第一年 · 第一学期 (Y1S1)'},
  {key: 'y1s2', year: 1, sem: 2, label: '第一年 · 第二学期 (Y1S2)'},

  {key: 'y2s2', year: 2, sem: 2, label: '第二年 · 第二学期 (Y2S2)'},

const FIXED = {
  y2s1: [{id: 'fixed-pic', name: 'PIC · 二级项目 (Projeto Integrador)', credits: 12, periods: [1, 2]}],
  y2s2: [{id: 'fixed-tese', name: 'Tese · 硕士论文 (Dissertação)', credits: 30, periods: [3, 4]}],
};

function periodsForSlot(slot) {
  return slot.sem === 1 ? [1, 2] : [3, 4];
}

const MAX_CREDITS = 36;
const STORAGE_KEY = 'course-plan-v1';
const PLANS_KEY = 'course-plans-v1';
const SCHEDULE_KEY = 'course-schedule-v1';
const FIXED_TOGGLES_KEY = 'course-fixed-toggles-v1';

function emptySelections() {
  return {y1s1: [], y1s2: [], y2s1: [], y2s2: []};
}
function defaultFixedToggles() {
  return {y2s1: true, y2s2: true};
}

let selections = loadSelections();
let savedPlans = loadPlans();
let compareChecked = [];
let schedule = loadSchedule();
let fixedToggles = loadFixedToggles();
let currentView = 'plan';
let currentSlot = 'y1s1';

function loadSelections() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return emptySelections();
}
function saveSelections() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(selections));
}
function loadPlans() {
  try {
    const raw = localStorage.getItem(PLANS_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return [];
}
function savePlansToStorage() {
  localStorage.setItem(PLANS_KEY, JSON.stringify(savedPlans));
}
function loadSchedule() {
  try {
    const raw = localStorage.getItem(SCHEDULE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return emptySelections();
}
function saveSchedule() {
  localStorage.setItem(SCHEDULE_KEY, JSON.stringify(schedule));
}
function loadFixedToggles() {
  try {
    const raw = localStorage.getItem(FIXED_TOGGLES_KEY);
    if (raw) return Object.assign(defaultFixedToggles(), JSON.parse(raw));
  } catch (e) {}
  return defaultFixedToggles();
}
function saveFixedToggles() {
  localStorage.setItem(FIXED_TOGGLES_KEY, JSON.stringify(fixedToggles));
}
function setFixedToggle(slotKey, checked) {
  fixedToggles[slotKey] = checked;
  saveFixedToggles();
  renderPlanView();
}

function resetAll() {
  if (!confirm('确定要清空当前草稿吗？已保存的方案不会受影响。')) return;
  selections = emptySelections();
  saveSelections();
  renderPlanView();
}

function courseById(id) { return COURSES.find(c => c.id === id); }
function isSelectedAnywhere(id) { return Object.values(selections).some(arr => arr.includes(id)); }

function addCourse(slotKey, courseId) {
  if (isSelectedAnywhere(courseId)) return;
  selections[slotKey].push(courseId);
  saveSelections();
  renderPlanView();
}
function removeCourse(slotKey, courseId) {
  selections[slotKey] = selections[slotKey].filter(id => id !== courseId);
  schedule[slotKey] = schedule[slotKey].filter(b => b.courseId !== courseId);
  saveSelections();
  saveSchedule();
  renderPlanView();
}

function slotCredits(slotKey, sel, toggles) {
  sel = sel || selections;
  toggles = toggles || fixedToggles;
  const fixedActive = (toggles[slotKey] !== false) ? (FIXED[slotKey] || []) : [];
  const fixed = fixedActive.reduce((s, c) => s + c.credits, 0);
  const chosen = (sel[slotKey] || []).reduce((s, id) => {
    const c = courseById(id);
    return s + (c ? c.credits : 0);
  }, 0);
  return fixed + chosen;
}
function barColor(used) {
  if (used > MAX_CREDITS) return 'var(--danger)';
  if (used >= MAX_CREDITS - 3) return 'var(--warn)';
  return 'var(--ok)';
}

/* ---------------- Nav / view switching ---------------- */
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-link').forEach(a => a.classList.toggle('active', a.dataset.view === view));
  document.getElementById('viewPlan').classList.toggle('hidden', view !== 'plan');
  document.getElementById('viewSchedule').classList.toggle('hidden', view !== 'schedule');
  document.getElementById('resetBtn').classList.toggle('hidden', view !== 'plan');
  document.getElementById('rulesBar').classList.toggle('hidden', view !== 'plan');
  if (view === 'plan') {
    document.getElementById('pageTitle').textContent = '课程学分规划表';
    document.getElementById('pageSub').textContent = 'MEEC (电气与计算机工程) + MEIC-A (信息与计算机工程) · 两年四学期';
    renderPlanView();
  } else {
    document.getElementById('pageTitle').textContent = '每周课表安排';
    document.getElementById('pageSub').textContent = '在网格上按住拖拽即可创建时间块，像日历一样自由安排 Teórica / Prática / Lab 的上课时间';
    renderSchedule();
  }
}
document.querySelectorAll('.nav-link').forEach(a => {
  a.addEventListener('click', (e) => { e.preventDefault(); switchView(a.dataset.view); });
});

/* ================= CREDIT PLANNER VIEW ================= */

function makeChip(item, opts) {
  opts = opts || {};
  const chip = document.createElement('div');
  chip.className = 'course-chip' + (opts.locked ? ' locked' : '') + (opts.span ? ' span-chip' : '');
  const tag = opts.locked
    ? '<span class="tag fixed">锁定</span>'
    : `<span class="tag ${item.program === 'MEEC' ? 'meec' : 'meic'}">${item.program}</span>`;
  chip.innerHTML = `
    ${tag}
    <span class="name">${item.name}</span>
    <span class="cred">${item.credits} ECTS</span>
    ${opts.locked ? '' : '<button class="remove" title="移除">×</button>'}
  `;
  if (!opts.locked) {
    chip.querySelector('.remove').onclick = () => removeCourse(opts.slotKey, item.id);
  }
  return chip;
}

function renderSemesters() {
  const root = document.getElementById('semesters');
  root.innerHTML = '';
  SLOTS.forEach(slot => {
    const used = slotCredits(slot.key);
    const pct = Math.min(100, (used / MAX_CREDITS) * 100);
    const [pA, pB] = periodsForSlot(slot);
    const card = document.createElement('div');
    card.className = 'sem-card';
    const over = used > MAX_CREDITS ? ' ⚠ 超出上限' : '';
    card.innerHTML = `
      <div class="sem-head">
        <h2>${slot.label}</h2>
        <span class="sem-credit-label" style="color:${barColor(used)}">${used} / ${MAX_CREDITS} ECTS${over}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${barColor(used)}"></div></div>
      <div class="fixed-toggle-slot"></div>
      <div class="period-block span-block">
        <div class="period-block-label">贯穿整学期 (P${pA}+P${pB})</div>
        <div class="chip-list span-list"></div>
      </div>
      <div class="period-columns">
        <div class="period-col">
          <div class="period-block-label">P${pA}</div>
          <div class="chip-list pa-list"></div>
        </div>
        <div class="period-col">
          <div class="period-block-label">P${pB}</div>
          <div class="chip-list pb-list"></div>
        </div>
      </div>
    `;
    const spanList = card.querySelector('.span-list');
    const paList = card.querySelector('.pa-list');
    const pbList = card.querySelector('.pb-list');
    const fixedSlot = card.querySelector('.fixed-toggle-slot');

    (FIXED[slot.key] || []).forEach(fc => {
      const checked = fixedToggles[slot.key] !== false;
      const row = document.createElement('div');
      row.className = 'fixed-toggle-row' + (checked ? '' : ' off');
      row.innerHTML = `
        <label class="fixed-toggle">
          <input type="checkbox" ${checked ? 'checked' : ''}>
          <span class="name">${fc.name}</span>
          <span class="cred">${fc.credits} ECTS</span>
        </label>
      `;
      row.querySelector('input').addEventListener('change', (e) => setFixedToggle(slot.key, e.target.checked));
      fixedSlot.appendChild(row);
    });

    const chosen = selections[slot.key].map(id => courseById(id)).filter(Boolean);
    const spanCourses = chosen.filter(c => c.periods.length === 2);
    const paCourses = chosen.filter(c => c.periods.length === 1 && c.periods[0] === pA);
    const pbCourses = chosen.filter(c => c.periods.length === 1 && c.periods[0] === pB);

    if (spanCourses.length === 0) {
      const hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = '暂无贯穿整学期的课程';
      spanList.appendChild(hint);
    }
    spanCourses.forEach(c => spanList.appendChild(makeChip(c, {slotKey: slot.key, span: true})));

    if (paCourses.length === 0) {
      const hint = document.createElement('div');
      hint.className = 'period-col-empty';
      hint.textContent = '暂无课程';
      paList.appendChild(hint);
    }
    paCourses.forEach(c => paList.appendChild(makeChip(c, {slotKey: slot.key})));

    if (pbCourses.length === 0) {
      const hint = document.createElement('div');
      hint.className = 'period-col-empty';
      hint.textContent = '暂无课程';
      pbList.appendChild(hint);
    }
    pbCourses.forEach(c => pbList.appendChild(makeChip(c, {slotKey: slot.key})));

    root.appendChild(card);
  });
}

function renderProgramFilters() {
  const root = document.getElementById('programFilters');
  root.innerHTML = `
    <label><input type="checkbox" value="MEEC" checked> MEEC</label>
    <label><input type="checkbox" value="MEIC-A" checked> MEIC-A</label>
    <label><input type="checkbox" value="1" class="semf" checked> 第一学期课程</label>
    <label><input type="checkbox" value="2" class="semf" checked> 第二学期课程</label>
  `;
  root.querySelectorAll('input').forEach(inp => inp.addEventListener('change', renderCatalog));
}

function renderTrackFilter() {
  const sel = document.getElementById('trackFilter');
  const tracks = Array.from(new Set(COURSES.map(c => c.track).filter(Boolean))).sort();
  sel.innerHTML = '<option value="">全部方向 / 领域</option>' + tracks.map(t => `<option value="${t}">${t}</option>`).join('');
  sel.addEventListener('change', renderCatalog);

function renderCatalog() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const programs = Array.from(document.querySelectorAll('#programFilters input[type=checkbox]:not(.semf)'))
    .filter(i => i.checked).map(i => i.value);
  const sems = Array.from(document.querySelectorAll('#programFilters input.semf'))
    .filter(i => i.checked).map(i => i.value);
  const track = document.getElementById('trackFilter').value;

  const filtered = COURSES.filter(c => {
    if (!programs.includes(c.program)) return false;
    if (!sems.includes(String(c.semester))) return false;
    if (track && c.track !== track) return false;
    if (q) {
      const hay = (c.name + ' ' + (c.name_en||'') + ' ' + (c.acronym||'') + ' ' + (c.track||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => a.name.localeCompare(b.name, 'pt'));

  const root = document.getElementById('catalog');
  root.innerHTML = '';
  document.getElementById('catalogCount').textContent = filtered.length;

  filtered.forEach(c => {
    const el = document.createElement('div');
    el.className = 'cat-item';
    const taken = isSelectedAnywhere(c.id);
    const tagClass = c.program === 'MEEC' ? 'meec' : 'meic';
    const periodStr = c.periods.length === 2 ? ' · 贯穿整学期' : ` · P${c.periods[0]}`;
    el.innerHTML = `
      <div class="top">
        <span class="tag ${tagClass}">${c.program}</span>
        <span class="name">${c.name}</span>
      </div>
      <div class="meta">${c.credits} ECTS · 第${c.semester}学期${periodStr} · ${c.track || ''}${c.acronym ? ' · '+c.acronym : ''}</div>
      <div class="actions"></div>
    `;
    const actions = el.querySelector('.actions');
    if (taken) {
      const btn = document.createElement('button');
      btn.textContent = '已加入课表';
      btn.disabled = true;
      actions.appendChild(btn);
    } else {
      SLOTS.filter(s => s.sem === c.semester).forEach(s => {
        const btn = document.createElement('button');
        btn.textContent = `+ ${s.label.split(' · ')[0]}`;
        btn.onclick = () => addCourse(s.key, c.id);
        actions.appendChild(btn);
      });
    }
    root.appendChild(el);
  });
}

/* ---------------- Plan management ---------------- */

function genId() { return 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }

function saveCurrentAsPlan() {
  const totalCourses = Object.values(selections).reduce((s, a) => s + a.length, 0);
  if (totalCourses === 0) {
    alert('当前草稿还没有添加任何课程，先在下方选好课程再保存吧。');
    return;
  }
  const name = prompt('给这个方案起个名字，例如「方案A - 侧重AI」：', `方案 ${savedPlans.length + 1}`);
  if (!name) return;
  savedPlans.push({
    id: genId(),
    name: name.trim(),
    createdAt: Date.now(),
    selections: JSON.parse(JSON.stringify(selections)),
    fixedToggles: JSON.parse(JSON.stringify(fixedToggles)),
  });
  savePlansToStorage();
  renderPlansList();
}

function loadPlan(id) {
  const plan = savedPlans.find(p => p.id === id);
  if (!plan) return;
  if (!confirm(`载入方案「${plan.name}」将替换当前草稿的选课，确定吗？`)) return;
  selections = JSON.parse(JSON.stringify(plan.selections));
  fixedToggles = Object.assign(defaultFixedToggles(), plan.fixedToggles || {});
  saveSelections();
  saveFixedToggles();
  renderPlanView();
}

function renamePlan(id) {
  const plan = savedPlans.find(p => p.id === id);
  if (!plan) return;
  const name = prompt('重命名方案：', plan.name);
  if (!name) return;
  plan.name = name.trim();
  savePlansToStorage();
  renderPlansList();
}

function deletePlan(id) {
  const plan = savedPlans.find(p => p.id === id);
  if (!plan) return;
  if (!confirm(`确定删除方案「${plan.name}」吗？此操作不可撤销。`)) return;
  savedPlans = savedPlans.filter(p => p.id !== id);
  compareChecked = compareChecked.filter(cid => cid !== id);
  savePlansToStorage();
  renderPlansList();
}

function toggleCompare(id, checked) {
  if (checked) {
    if (compareChecked.length >= 2) compareChecked.shift();
    compareChecked.push(id);
  } else {
    compareChecked = compareChecked.filter(cid => cid !== id);
  }
  renderPlansList();
}

function fmtDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function planTotalCredits(sel, toggles) {
  return SLOTS.reduce((s, slot) => s + slotCredits(slot.key, sel, toggles), 0);
}

function renderPlansList() {
  const root = document.getElementById('plansList');
  root.innerHTML = '';
  if (savedPlans.length === 0) {
    root.innerHTML = '<div class="plan-empty">还没有保存任何方案。选好课程后点击右上角「将当前草稿保存为新方案」。</div>';
  } else {
    savedPlans.slice().sort((a,b) => b.createdAt - a.createdAt).forEach(plan => {
      const row = document.createElement('div');
      row.className = 'plan-row';
      const checked = compareChecked.includes(plan.id);
      row.innerHTML = `
        <input type="checkbox" title="勾选以加入对比（最多两个）" ${checked ? 'checked' : ''}>
        <span class="pname">${plan.name}</span>
        <span class="pmeta">${planTotalCredits(plan.selections, plan.fixedToggles)} ECTS · ${fmtDate(plan.createdAt)}</span>
        <span class="pactions">
          <button class="load-btn">载入</button>
          <button class="rename-btn">重命名</button>
          <button class="del-btn danger">删除</button>
        </span>
      `;
      row.querySelector('input[type=checkbox]').addEventListener('change', (e) => toggleCompare(plan.id, e.target.checked));
      row.querySelector('.load-btn').onclick = () => loadPlan(plan.id);
      row.querySelector('.rename-btn').onclick = () => renamePlan(plan.id);
      row.querySelector('.del-btn').onclick = () => deletePlan(plan.id);
      root.appendChild(row);
    });
  }
  document.getElementById('compareBtn').disabled = compareChecked.length !== 2;
}

/* ---------------- Comparison ---------------- */

function openCompare() {
  if (compareChecked.length !== 2) return;
  const planA = savedPlans.find(p => p.id === compareChecked[0]);
  const planB = savedPlans.find(p => p.id === compareChecked[1]);
  if (!planA || !planB) return;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeCompare(); };

  const box = document.createElement('div');
  box.className = 'modal-box';

  let html = `
    <button class="modal-close" onclick="closeCompare()">×</button>
    <h2>方案对比：${planA.name} vs ${planB.name}</h2>
    <div class="modal-sub">保存时间：${fmtDate(planA.createdAt)} / ${fmtDate(planB.createdAt)} &nbsp;·&nbsp; 总学分：${planTotalCredits(planA.selections, planA.fixedToggles)} ECTS / ${planTotalCredits(planB.selections, planB.fixedToggles)} ECTS</div>
    <div class="compare-row" style="margin-bottom:8px;">
      <div class="compare-col-head" style="color:var(--meec)">${planA.name}</div>
      <div class="compare-col-head" style="color:var(--meic)">${planB.name}</div>
    </div>
  `;

  SLOTS.forEach(slot => {
    const idsA = planA.selections[slot.key] || [];
    const idsB = planB.selections[slot.key] || [];
    const onlyA = idsA.filter(id => !idsB.includes(id));
    const onlyB = idsB.filter(id => !idsA.includes(id));
    const common = idsA.filter(id => idsB.includes(id));

    const renderItem = (id, cls) => {
      const c = courseById(id);
      if (!c) return '';
      return `<div class="diff-item ${cls}">${c.name} <span style="color:var(--muted)">· ${c.credits} ECTS</span></div>`;
    };

    const fixedItems = FIXED[slot.key] || [];
    const fixedRow = fixedItems.length ? `
          <div class="diff-list">
            ${fixedItems.map(fc => `<div class="diff-item">${fc.name} <span style="color:var(--muted)">· ${(planA.fixedToggles||{})[slot.key] !== false ? '包含' : '不包含'} · ${fc.credits} ECTS</span></div>`).join('')}
          </div>
          <div class="diff-list">
            ${fixedItems.map(fc => `<div class="diff-item">${fc.name} <span style="color:var(--muted)">· ${(planB.fixedToggles||{})[slot.key] !== false ? '包含' : '不包含'} · ${fc.credits} ECTS</span></div>`).join('')}
          </div>
    ` : '';

    html += `
      <div class="compare-slot">
        <div class="compare-slot-title">${slot.label}</div>
        <div class="compare-row">${fixedRow}</div>
        <div class="compare-row">
          <div class="diff-list">
            ${common.map(id => renderItem(id, 'common')).join('') || ''}
            ${onlyA.map(id => renderItem(id, 'only-a')).join('') || ''}
            ${(onlyA.length === 0 && common.length === 0) ? '<div class="diff-none">（无）</div>' : ''}
          </div>
          <div class="diff-list">
            ${common.map(id => renderItem(id, 'common')).join('') || ''}
            ${onlyB.map(id => renderItem(id, 'only-b')).join('') || ''}
            ${(onlyB.length === 0 && common.length === 0) ? '<div class="diff-none">（无）</div>' : ''}
          </div>
        </div>
        <div class="compare-credit-summary">
          <span>${planA.name}: ${slotCredits(slot.key, planA.selections, planA.fixedToggles)} ECTS</span>
          <span>${planB.name}: ${slotCredits(slot.key, planB.selections, planB.fixedToggles)} ECTS</span>
        </div>
      </div>
    `;
  });

  box.innerHTML = html;
  overlay.appendChild(box);
  document.getElementById('modalRoot').appendChild(overlay);
}
function closeCompare() { document.getElementById('modalRoot').innerHTML = ''; }

function renderPlanView() {
  renderSemesters();
  renderCatalog();
  renderPlansList();
}

/* ================= WEEKLY SCHEDULE VIEW ================= */

const DAY_START = 8 * 60;
const DAY_END = 21 * 60;
const HOUR_PX = 64;
const PX_PER_MIN = HOUR_PX / 60;
const SNAP_MIN = 15;

const COMPONENTS = [
  {key: 'T', label: 'Teórica'},
  {key: 'P', label: 'Prática'},
  {key: 'L', label: 'Lab'},
];

const PALETTE = [
  '#4c6ef5', '#e8590c', '#2f9e64', '#ae3ec9', '#f08c00',
  '#1c7ed6', '#e64980', '#37b24d', '#7048e8', '#f5501f',
  '#0ca678', '#d6336c',
];

function coursesInSlot(slotKey) {
  return (selections[slotKey] || []).map(courseById).filter(Boolean);
}
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) >>> 0; }
  return h;
}
function colorForCourse(id) { return PALETTE[hashStr(id) % PALETTE.length]; }
function fmtTime(min) {
  const h = Math.floor(min / 60), m = min % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function genBlockId() { return 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

function renderTabs() {
  const root = document.getElementById('slotTabs');
  root.innerHTML = '';
  SLOTS.forEach(slot => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (slot.key === currentSlot ? ' active' : '');
    const n = coursesInSlot(slot.key).length;
    btn.innerHTML = `${slot.label}<span class="credit-pill">(${n} 门课)</span>`;
    btn.onclick = () => { currentSlot = slot.key; renderSchedule(); };
    root.appendChild(btn);
  });
}

function renderLegend() {
  document.getElementById('legendTitle').textContent = SLOTS.find(s => s.key === currentSlot).label + ' · 课程';
  const root = document.getElementById('legendList');
  root.innerHTML = '';
  const list = coursesInSlot(currentSlot);
  if (list.length === 0) {
    root.innerHTML = '<div class="legend-empty">该学期还没有选课，请先到「学分规划」页面选课。</div>';
    return;
  }
  list.forEach(c => {
    const blocksCount = schedule[currentSlot].filter(b => b.courseId === c.id).length;
    const el = document.createElement('div');
    el.className = 'legend-item';
    el.innerHTML = `
      <span class="legend-dot" style="background:${colorForCourse(c.id)}"></span>
      <span class="lname">${c.name}</span>
      <span class="lmeta">${blocksCount} 个时间块</span>
    `;
    root.appendChild(el);
  });
}

function pruneOrphanBlocks() {
  const validIds = new Set(coursesInSlot(currentSlot).map(c => c.id));
  const before = schedule[currentSlot].length;
  schedule[currentSlot] = schedule[currentSlot].filter(b => validIds.has(b.courseId));
  if (schedule[currentSlot].length !== before) saveSchedule();
}

function renderGrid() {
  pruneOrphanBlocks();
  const body = document.getElementById('calBody');
  body.innerHTML = '';
  body.style.setProperty('--hourpx', HOUR_PX + 'px');
  const totalMin = DAY_END - DAY_START;
  const totalPx = totalMin * PX_PER_MIN;

  const hoursCol = document.createElement('div');
  hoursCol.className = 'cal-hours';
  hoursCol.style.height = totalPx + 'px';
  for (let m = DAY_START; m <= DAY_END; m += 60) {
    const lbl = document.createElement('div');
    lbl.className = 'hour-label';
    lbl.style.top = ((m - DAY_START) * PX_PER_MIN) + 'px';
    lbl.textContent = fmtTime(m);
    hoursCol.appendChild(lbl);
  }
  body.appendChild(hoursCol);

  const blocks = schedule[currentSlot] || [];

  for (let day = 0; day < 5; day++) {
    const col = document.createElement('div');
    col.className = 'cal-day-col';
    col.style.height = totalPx + 'px';
    col.dataset.day = day;
    col.addEventListener('mousedown', (e) => onColumnMouseDown(e, col, day));
    body.appendChild(col);
  }

  const dayCols = body.querySelectorAll('.cal-day-col');
  blocks.forEach(b => {
    const col = dayCols[b.day];
    if (!col) return;
    col.appendChild(renderBlockEl(b, blocks));
  });
}

function blockOverlaps(b, others) {
  return others.some(o => o.id !== b.id && o.day === b.day && b.start < o.end && o.start < b.end);
}

function renderBlockEl(b, allBlocks) {
  const c = courseById(b.courseId);
  const el = document.createElement('div');
  el.className = 'cal-block' + (blockOverlaps(b, allBlocks) ? ' overlap' : '');
  el.style.top = ((b.start - DAY_START) * PX_PER_MIN) + 'px';
  el.style.height = Math.max(18, (b.end - b.start) * PX_PER_MIN) + 'px';
  const color = colorForCourse(b.courseId);
  el.style.background = color + '2a';
  el.style.color = shadeColor(color);
  el.style.borderColor = color + '55';
  const compLabel = (COMPONENTS.find(x => x.key === b.component) || {}).label || b.component;
  el.innerHTML = `
    <div class="b-title">${c ? c.name : '(未知课程)'}</div>
    <div class="b-comp">${compLabel}</div>
    <div class="b-time">${fmtTime(b.start)}–${fmtTime(b.end)}</div>
    <div class="resize-handle"></div>
  `;
  el.dataset.blockId = b.id;
  el.addEventListener('mousedown', (e) => onBlockMouseDown(e, b));
  el.querySelector('.resize-handle').addEventListener('mousedown', (e) => onResizeMouseDown(e, b));
  return el;
}

function shadeColor(hex) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) & 0xff, g = (num >> 8) & 0xff, b = num & 0xff;
  r = Math.round(r * 0.6); g = Math.round(g * 0.6); b = Math.round(b * 0.6);
  return `rgb(${r},${g},${b})`;
}

function snap(min) { return Math.round(min / SNAP_MIN) * SNAP_MIN; }
function clampMin(min) { return Math.min(DAY_END, Math.max(DAY_START, min)); }

function onColumnMouseDown(e, col, day) {
  if (e.target.closest('.cal-block')) return;
  e.preventDefault();
  const rect = col.getBoundingClientRect();
  const startMin = clampMin(snap(DAY_START + (e.clientY - rect.top) / PX_PER_MIN));

  const ghost = document.createElement('div');
  ghost.className = 'cal-block ghost';
  ghost.style.background = 'var(--accent-bg)';
  ghost.style.borderColor = 'var(--accent)';
  ghost.style.color = 'var(--accent)';
  ghost.style.top = ((startMin - DAY_START) * PX_PER_MIN) + 'px';
  ghost.style.height = '18px';
  col.appendChild(ghost);

  let curEndMin = startMin + SNAP_MIN;

  function onMove(ev) {
    const y = ev.clientY - rect.top;
    let endMin = clampMin(snap(DAY_START + y / PX_PER_MIN));
    if (endMin <= startMin) endMin = startMin + SNAP_MIN;
    curEndMin = endMin;
    ghost.style.top = ((startMin - DAY_START) * PX_PER_MIN) + 'px';
    ghost.style.height = Math.max(18, (endMin - startMin) * PX_PER_MIN) + 'px';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    ghost.remove();
    openEditor({mode: 'create', day, start: startMin, end: curEndMin}, {clientX: e.clientX, clientY: e.clientY});
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function onBlockMouseDown(e, b) {
  if (e.target.classList.contains('resize-handle')) return;
  e.preventDefault();
  e.stopPropagation();
  const startX = e.clientX, startY = e.clientY;
  const origDay = b.day, origStart = b.start, duration = b.end - b.start;
  let moved = false;
  const col0 = document.querySelectorAll('.cal-day-col')[origDay];
  const rect = col0.getBoundingClientRect();
  const colWidth = rect.width;

  function onMove(ev) {
    const dx = ev.clientX - startX, dy = ev.clientY - startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
    if (!moved) return;
    const dayDelta = Math.round(dx / colWidth);
    let newDay = Math.min(4, Math.max(0, origDay + dayDelta));
    const minDelta = snap(dy / PX_PER_MIN);
    let newStart = clampMin(origStart + minDelta);
    let newEnd = newStart + duration;
    if (newEnd > DAY_END) { newEnd = DAY_END; newStart = newEnd - duration; }
    b.day = newDay; b.start = newStart; b.end = newEnd;
    renderGrid();
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    if (moved) {
      saveSchedule();
      renderLegend();
    } else {
      openEditor({mode: 'edit', block: b}, {clientX: e.clientX, clientY: e.clientY});
    }
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function onResizeMouseDown(e, b) {
  e.preventDefault();
  e.stopPropagation();
  const startY = e.clientY;
  const origEnd = b.end;
  function onMove(ev) {
    const dy = ev.clientY - startY;
    let newEnd = clampMin(origEnd + snap(dy / PX_PER_MIN));
    if (newEnd < b.start + SNAP_MIN) newEnd = b.start + SNAP_MIN;
    b.end = newEnd;
    renderGrid();
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    saveSchedule();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function openEditor(ctx, pos) {
  closeEditor();
  const list = coursesInSlot(currentSlot);
  if (ctx.mode === 'create' && list.length === 0) {
    alert('该学期还没有选课，请先到「学分规划」页面选课后再来安排时间。');
    return;
  }
  const editingBlock = ctx.mode === 'edit' ? ctx.block : null;
  let selCourseId = editingBlock ? editingBlock.courseId : list[0].id;
  let selComp = editingBlock ? editingBlock.component : 'T';

  const overlay = document.createElement('div');
  overlay.className = 'popup-overlay';
  overlay.onclick = closeEditor;

  const popup = document.createElement('div');
  popup.className = 'popup';
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = Math.min(pos.clientX, vw - 260);
  let top = Math.min(pos.clientY, vh - 260);
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  popup.onclick = (e) => e.stopPropagation();

  popup.innerHTML = `
    <label>课程</label>
    <select id="editorCourse"></select>
    <label>课程类型</label>
    <div class="comp-pills" id="editorComps"></div>
    <div class="popup-actions">
      ${editingBlock ? '<button class="delete" id="editorDelete">删除</button>' : ''}
      <button id="editorCancel">取消</button>
      <button class="confirm" id="editorConfirm">${editingBlock ? '保存' : '添加'}</button>
    </div>
  `;
  const courseSel = popup.querySelector('#editorCourse');
  list.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.name;
    if (c.id === selCourseId) opt.selected = true;
    courseSel.appendChild(opt);
  });
  courseSel.addEventListener('change', () => { selCourseId = courseSel.value; });

  const compsRoot = popup.querySelector('#editorComps');
  COMPONENTS.forEach(comp => {
    const b = document.createElement('button');
    b.textContent = comp.label;
    b.className = comp.key === selComp ? 'active' : '';
    b.onclick = () => {
      selComp = comp.key;
      compsRoot.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    };
    compsRoot.appendChild(b);
  });

  popup.querySelector('#editorCancel').onclick = closeEditor;
  popup.querySelector('#editorConfirm').onclick = () => {
    if (ctx.mode === 'create') {
      schedule[currentSlot].push({
        id: genBlockId(), courseId: selCourseId, component: selComp,
        day: ctx.day, start: ctx.start, end: ctx.end,
      });
    } else {
      editingBlock.courseId = selCourseId;
      editingBlock.component = selComp;
    }
    saveSchedule();
    closeEditor();
    renderSchedule();
  };
  const delBtn = popup.querySelector('#editorDelete');
  if (delBtn) {
    delBtn.onclick = () => {
      schedule[currentSlot] = schedule[currentSlot].filter(x => x.id !== editingBlock.id);
      saveSchedule();
      closeEditor();
      renderSchedule();
    };
  }

  overlay.appendChild(popup);
  document.getElementById('popupRoot').appendChild(overlay);
}
function closeEditor() { document.getElementById('popupRoot').innerHTML = ''; }

function renderSchedule() {
  renderTabs();
  renderLegend();
  renderGrid();
}

/* ---------------- init ---------------- */
document.getElementById('searchInput').addEventListener('input', renderCatalog);
renderProgramFilters();
renderTrackFilter();
renderPlanView();
</script>
</body>
</html>
